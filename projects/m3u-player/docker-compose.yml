version: '3.8'

services:
  # M3U Player 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m3u-player-app
    restart: unless-stopped
    ports:
      - "3456:3456"  # 直接暴露应用端口
    volumes:
      - ./data:/data  # 持久化数据库
      - ./logs:/app/logs  # 日志目录（可选）
    environment:
      - NODE_ENV=production
      - PORT=3456
      - DATABASE_PATH=/data/m3u-player.db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3456/api/data"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - m3u-network

networks:
  m3u-network:
    driver: bridge
