# Nginx 配置文件 for M3U Player

events {
    worker_connections 1024;
}

http {
    # 上游应用服务器
    upstream m3u_app {
        server app:3456;
    }

    # 增加允许的请求体大小（处理大 M3U 文件）
    client_max_body_size 10M;

    # HTTP 服务器（生产环境建议重定向到 HTTPS）
    server {
        listen 80;
        server_name localhost;  # 修改为你的域名

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 代理所有请求到 Node.js 应用
        location / {
            proxy_pass http://m3u_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # CORS 头（作为后备）
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PATCH, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        }

        # 静态文件缓存（如果使用 nginx 直接服务）
        # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        #     expires 1y;
        #     add_header Cache-Control "public, immutable";
        # }
    }

    # HTTPS 服务器（需要证书时启用）
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # 其他配置同上...
    # }
}
