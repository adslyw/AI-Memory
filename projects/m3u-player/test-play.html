<!DOCTYPE html>
<html>
<head>
    <title>M3U Player - Quick Test</title>
</head>
<body>
    <h1>M3U Player - 快速测试页面</h1>
    
    <div style="display:flex; height:80vh;">
        <div style="width:300px; background:#333; color:#fff; padding:10px; overflow:auto;">
            <h3>频道列表</h3>
            <div id="channel-list"></div>
            <button onclick="addTestChannel()">添加测试频道</button>
        </div>
        <div style="flex:1; background:#000; display:flex; align-items:center; justify-content:center;">
            <video id="video" controls width="100%" height="100%"></video>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="app.js"></script>
    <script>
        // 快速测试模式
        const player = new M3UPlayer();
        
        function addTestChannel() {
            // 测试用 m3u8 链接
            const testUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
            player.channels.push({
                id: Date.now().toString(),
                name: 'Test Stream (Big Buck Bunny)',
                url: testUrl
            });
            player.saveChannels();
            player.renderChannelList();
            player.playChannel(player.channels[player.channels.length-1]);
        }
        
        // 自动添加测试频道
        if (player.channels.length === 0) {
            addTestChannel();
        }
    </script>
</body>
</html>
